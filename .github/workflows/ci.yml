name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -v ./...

  cross-build:
    name: Cross build (${{ matrix.goos }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [freebsd, openbsd, netbsd, dragonfly, solaris]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: amd64
        run: go build ./...
